<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Cliente | DOMKA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/app-pages.css" />
  <style>
    .sidebar-nav-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: .88rem;
      font-weight: 500;
      color: var(--gray);
      background: transparent;
      border: none;
      cursor: pointer;
      text-align: left;
      font-family: 'DM Sans', sans-serif;
      transition: all .2s;
    }
    .sidebar-nav-btn:hover { background: var(--bg); color: var(--green); }
    .auth-stack { max-width: 420px; }
    .auth-stack .form-grid { display: grid; gap: 14px; margin-bottom: 18px; }
    .auth-stack input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--line);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      background: #faf8f4;
    }
    .auth-stack input:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(27,122,81,.1);
      background: var(--white);
    }
    #btn-login {
      width: 100%;
      padding: 11px 18px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<aside class="app-sidebar">
  <div class="sidebar-brand-wrap">
    <span class="sidebar-brand-name">DOMKA</span>
    <span class="sidebar-brand-sub">Portal cliente</span>
  </div>
  <nav class="sidebar-links" aria-label="Secciones">
    <button type="button" class="sidebar-nav-btn" id="btn-mi-proyecto">
      <i class="fas fa-hard-hat"></i> Mi proyecto
    </button>
    <button type="button" class="sidebar-nav-btn" id="btn-documentos">
      <i class="fas fa-folder-open"></i> Documentos
    </button>
    <button type="button" class="sidebar-nav-btn" id="btn-evidencias">
      <i class="fas fa-camera"></i> Evidencias
    </button>
  </nav>
  <div class="sidebar-bottom">
    <button type="button" id="btn-logout" class="btn-logout">
      <i class="fas fa-sign-out-alt"></i> Cerrar sesión
    </button>
    <a href="../index.html" class="sidebar-link" style="margin-top:12px">
      <i class="fas fa-globe"></i> Sitio web
    </a>
  </div>
</aside>

<div class="page-with-sidebar">
  <section id="auth-box">
    <div class="page-topbar">
      <div>
        <h1 class="page-heading">Acceso cliente</h1>
        <p class="page-subheading">Ingresa con el correo registrado por DOMKA</p>
      </div>
    </div>
    <div class="form-container auth-stack p-6">
      <div class="form-grid">
        <div>
          <label class="lbl" for="email">Correo</label>
          <input id="email" type="email" autocomplete="email" placeholder="correo@ejemplo.com" />
        </div>
        <div>
          <label class="lbl" for="password">Contraseña</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
        </div>
      </div>
      <button type="button" class="btn-primary" id="btn-login">Ingresar</button>
    </div>
  </section>

  <section id="client-box" hidden>
    <div class="page-topbar">
      <div>
        <h1 class="page-heading">Tu proyecto</h1>
        <p class="page-subheading">Seguimiento y documentación</p>
      </div>
    </div>
    <div class="form-container p-6">
      <div id="client-content"></div>
    </div>
  </section>
</div>

<script type="module" src="../js/modules/client-portal.js"></script>
</body>
</html>
