<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Empresa | DOMKA</title>
  <link rel="stylesheet" href="../css/app.css" />
</head>
<body>
  <div class="portal-shell">
    <aside class="sidebar">
      <h2>Portal Empresa</h2>
      <p class="muted">Gestion operativa interna</p>
      <button id="btn-dashboard">Dashboard</button>
      <button id="btn-empleados">Empleados</button>
      <button id="btn-nomina">Nomina</button>
      <button id="btn-proyectos">Proyectos</button>
      <button id="btn-clientes">Clientes</button>
      <button id="btn-logout">Cerrar sesion</button>
      <a href="../index.html">Volver a web publica</a>
    </aside>

    <main class="content">
      <section id="auth-box">
        <h3>Acceso administrador</h3>
        <div class="form-grid">
          <input id="email" type="email" placeholder="Correo" />
          <input id="password" type="password" placeholder="Contrasena" />
        </div>
        <button class="btn" id="btn-login">Ingresar</button>
      </section>

      <section id="dashboard-box" hidden>
        <h3>Dashboard General</h3>
        <p id="dashboard-summary" class="muted">Cargando indicadores...</p>
      </section>

      <section id="module-box" hidden>
        <h3 id="module-title">Modulo</h3>
        <div id="module-content"></div>
      </section>
    </main>
  </div>

  <script type="module" src="../js/modules/admin.js"></script>
</body>
</html>
