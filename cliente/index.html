<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Cliente | DOMKA</title>
  <link rel="stylesheet" href="../css/app.css" />
</head>
<body>
  <div class="portal-shell">
    <aside class="sidebar">
      <h2>Portal Cliente</h2>
      <p class="muted">Seguimiento transparente</p>
      <button id="btn-mi-proyecto">Mi proyecto</button>
      <button id="btn-documentos">Documentos</button>
      <button id="btn-evidencias">Evidencias</button>
      <button id="btn-logout">Cerrar sesion</button>
      <a href="../index.html">Volver a web publica</a>
    </aside>

    <main class="content">
      <section id="auth-box">
        <h3>Acceso cliente</h3>
        <div class="form-grid">
          <input id="email" type="email" placeholder="Correo cliente" />
          <input id="password" type="password" placeholder="Contrasena" />
        </div>
        <button class="btn" id="btn-login">Ingresar</button>
      </section>

      <section id="client-box" hidden>
        <h3>Informacion de proyecto</h3>
        <div id="client-content"></div>
      </section>
    </main>
  </div>

  <script type="module" src="../js/modules/client-portal.js"></script>
</body>
</html>
